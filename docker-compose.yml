services:
  nickhub:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_APP_NAME: Nickhub
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      TMDB_READ_TOKEN: ${TMDB_READ_TOKEN:-}
      REAL_DEBRID_TOKEN: ${REAL_DEBRID_TOKEN:-}
      ALLDEBRID_TOKEN: ${ALLDEBRID_TOKEN:-}
      PREMIUMIZE_TOKEN: ${PREMIUMIZE_TOKEN:-}
      DEBRID_LINK_TOKEN: ${DEBRID_LINK_TOKEN:-}
      OFFCLOUD_TOKEN: ${OFFCLOUD_TOKEN:-}
      ORIONOID_TOKEN: ${ORIONOID_TOKEN:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
